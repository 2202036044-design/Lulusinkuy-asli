<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roy Rent - Jasa Sewa Mobil Modern</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- React, Babel, Framer Motion, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Simple Lucide Icon Component for HTML Version
        const Icon = ({ name, className = "", size = 24 }) => {
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Home', href: '#' },
                { name: 'Armada', href: '#armada' },
                { name: 'Cara Pesan', href: '#cara-pesan' },
                { name: 'Syarat', href: '#syarat' }
            ];

            // Animasi Variants (Dua Arah / Mirror)
            const fadeUp = {
                hidden: { opacity: 0, y: 40 },
                visible: { opacity: 1, y: 0, transition: { duration: 0.6, ease: "easeOut" } }
            };

            const slideL = {
                hidden: { opacity: 0, x: -60 },
                visible: { opacity: 1, x: 0, transition: { duration: 0.7, ease: "easeOut" } }
            };

            const slideR = {
                hidden: { opacity: 0, x: 60 },
                visible: { opacity: 1, x: 0, transition: { duration: 0.7, ease: "easeOut" } }
            };

            const zoomIn = {
                hidden: { opacity: 0, scale: 0.9 },
                visible: { opacity: 1, scale: 1, transition: { duration: 0.5 } }
            };

            return (
                <div className="bg-white">
                    {/* --- HEADER --- */}
                    <header className={`fixed top-0 left-0 w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/90 glass-effect shadow-lg py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className={`p-2 rounded-xl transition-colors ${isScrolled ? 'bg-sky-500 text-white' : 'bg-white text-sky-500'}`}>
                                    <Icon name="car" size={24} />
                                </div>
                                <span className={`text-2xl font-extrabold tracking-tighter ${isScrolled ? 'text-slate-900' : 'text-white'}`}>ROY<span className="text-sky-500">RENT</span></span>
                            </div>

                            <nav className="hidden md:flex items-center gap-8">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} className={`text-sm font-bold transition-all relative group ${isScrolled ? 'text-slate-600 hover:text-sky-600' : 'text-white/90 hover:text-sky-400'}`}>
                                        {link.name}
                                        <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-sky-500 transition-all duration-300 group-hover:w-full"></span>
                                    </a>
                                ))}
                                <button className="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg shadow-orange-500/30 transition-all active:scale-95">
                                    Hubungi Kami
                                </button>
                            </nav>

                            <button className={`md:hidden p-2 ${isScrolled ? 'text-slate-900' : 'text-white'}`} onClick={() => setIsMenuOpen(true)}>
                                <Icon name="menu" size={28} />
                            </button>
                        </div>
                    </header>

                    {/* MOBILE MENU OVERLAY */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <motion.div initial={{ opacity: 0, x: '100%' }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: '100%' }} className="fixed inset-0 z-[60] bg-white p-6 flex flex-col">
                                <div className="flex justify-between items-center mb-12">
                                    <span className="text-2xl font-bold text-slate-900">ROY<span className="text-sky-500">RENT</span></span>
                                    <button onClick={() => setIsMenuOpen(false)} className="p-2 text-slate-500"><Icon name="x" size={32} /></button>
                                </div>
                                <div className="flex flex-col gap-8">
                                    {navLinks.map((link) => (
                                        <a key={link.name} href={link.href} onClick={() => setIsMenuOpen(false)} className="text-2xl font-bold text-slate-800 border-b pb-4 border-slate-100 hover:text-sky-500 transition-colors">{link.name}</a>
                                    ))}
                                    <button className="bg-sky-500 text-white py-5 rounded-2xl font-bold text-lg shadow-xl">Pesan Sekarang</button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* --- HERO SECTION --- */}
                    <section className="relative min-h-screen flex items-center bg-slate-900 overflow-hidden">
                        <div className="absolute inset-0 opacity-40">
                            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=2000" className="w-full h-full object-cover" alt="Hero background" />
                        </div>
                        <div className="container mx-auto px-6 relative z-10 grid lg:grid-cols-2 gap-16 items-center pt-20">
                            <motion.div initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={fadeUp}>
                                <h1 className="text-5xl md:text-7xl font-extrabold text-white leading-[1.1] mb-8">
                                    Perjalanan Lebih Mudah, <br />
                                    <span className="text-sky-400">Nyaman & Aman.</span>
                                </h1>
                                <p className="text-xl text-white/80 mb-10 max-w-lg leading-relaxed font-light">
                                    Solusi sewa mobil premium dengan armada terbaru dan layanan pelanggan 24 jam untuk setiap destinasi Anda.
                                </p>
                                <div className="flex flex-wrap gap-5">
                                    <button className="bg-sky-500 hover:bg-sky-600 text-white px-10 py-5 rounded-full font-bold shadow-2xl shadow-sky-500/40 transition-all flex items-center gap-3 active:scale-95 group">
                                        Lihat Armada <Icon name="chevron-right" size={20} className="group-hover:translate-x-1 transition-transform" />
                                    </button>
                                </div>
                            </motion.div>

                            {/* Booking Widget */}
                            <motion.div initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={slideR} className="bg-white/95 glass-effect p-8 md:p-10 rounded-[2.5rem] shadow-2xl border border-white/20">
                                <h3 className="text-2xl font-bold mb-8 flex items-center gap-3 text-slate-900"><Icon name="calendar" className="text-sky-500" /> Temukan Mobil</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Lokasi Jemput</label>
                                        <div className="relative">
                                            <Icon name="map-pin" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                            <input type="text" placeholder="Pilih Kota/Bandara" className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-sm" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Jenis Layanan</label>
                                        <select className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-sm text-slate-600 appearance-none cursor-pointer">
                                            <option>Sewa Lepas Kunci</option>
                                            <option>Dengan Supir</option>
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Tgl Ambil</label>
                                        <input type="date" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-sm" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Tgl Kembali</label>
                                        <input type="date" className="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all text-sm" />
                                    </div>
                                </div>
                                <button className="w-full mt-10 bg-sky-600 hover:bg-sky-700 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-sky-600/20 transition-all active:scale-[0.98]">
                                    Cek Ketersediaan
                                </button>
                            </motion.div>
                        </div>
                    </section>

                    {/* --- KEUNGGULAN --- */}
                    <section className="py-24 bg-white">
                        <div className="container mx-auto px-6">
                            <motion.div initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={fadeUp} className="text-center mb-20">
                                <span className="text-sky-500 font-bold uppercase tracking-[0.2em] text-xs">Benefit Sewa</span>
                                <h2 className="text-4xl font-extrabold mt-3 text-slate-900">Kenapa Memilih Roy Rent?</h2>
                            </motion.div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { i: "car", t: "Armada Terawat", d: "Unit mobil kami selalu dalam kondisi prima dan rutin melakukan servis berkala." },
                                    { i: "shield-check", t: "Harga Jujur", d: "Tidak ada biaya tersembunyi. Transparan dan kompetitif di kelasnya." },
                                    { i: "clock", t: "Layanan 24/7", d: "Tim bantuan kami selalu siaga kapanpun Anda membutuhkan bantuan darurat." },
                                    { i: "user-check", t: "Supir Profesional", d: "Driver berpengalaman, ramah, dan sangat menguasai rute jalan." }
                                ].map((item, idx) => (
                                    <motion.div key={idx} initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.2 }} variants={fadeUp} className="p-10 rounded-[2.5rem] bg-slate-50 hover:bg-white border border-transparent hover:border-slate-100 hover:shadow-2xl transition-all duration-500 group">
                                        <div className="w-16 h-16 bg-white group-hover:bg-sky-500 group-hover:text-white rounded-2xl flex items-center justify-center mb-8 shadow-sm transition-all duration-300 text-sky-500">
                                            <Icon name={item.i} size={32} />
                                        </div>
                                        <h4 className="text-2xl font-bold mb-4 text-slate-900">{item.t}</h4>
                                        <p className="text-slate-500 leading-relaxed text-sm">{item.d}</p>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* --- KATALOG ARMADA --- */}
                    <section id="armada" className="py-24 bg-slate-50">
                        <div className="container mx-auto px-6">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                                <motion.div initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={slideL}>
                                    <span className="text-sky-500 font-bold uppercase tracking-[0.2em] text-xs">Pilihan Unit</span>
                                    <h2 className="text-4xl font-extrabold mt-3 text-slate-900">Armada Paling Populer</h2>
                                </motion.div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                {[
                                    { n: "Toyota Avanza", p: "350.000", seats: 7, trans: "Manual", bags: 2, img: "/asset/gambarpreviewporto/Toyota.webp" },
                                    { n: "Toyota Innova Zenix", p: "750.000", seats: 7, trans: "Matic", bags: 3, img: "/asset/gambarpreviewporto/Zenix.webp" },
                                    { n: "Toyota Alphard", p: "2.500.000", seats: 6, trans: "Matic", bags: 4, img: "/asset/gambarpreviewporto/download.webp" }
                                ].map((car, idx) => (
                                    <motion.div key={idx} initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.2 }} variants={idx % 2 === 0 ? slideL : slideR} className="bg-white rounded-[3rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 group">
                                        <div className="h-64 overflow-hidden relative">
                                            <img src={car.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt={car.n} />
                                            <div className="absolute top-6 right-6 bg-white/90 backdrop-blur px-4 py-2 rounded-full text-xs font-bold text-sky-600 shadow-lg">Tersedia</div>
                                        </div>
                                        <div className="p-10">
                                            <h3 className="text-2xl font-bold mb-6 text-slate-900">{car.n}</h3>
                                            <div className="flex items-center gap-6 mb-8 text-slate-400 text-sm">
                                                <div className="flex items-center gap-2"><Icon name="users" size={16} className="text-sky-500" /> {car.seats} Kursi</div>
                                                <div className="flex items-center gap-2"><Icon name="settings" size={16} className="text-sky-500" /> {car.trans}</div>
                                                <div className="flex items-center gap-2"><Icon name="briefcase" size={16} className="text-sky-500" /> {car.bags}</div>
                                            </div>
                                            <div className="flex justify-between items-center pt-8 border-t border-slate-50">
                                                <div>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1">Mulai Dari</p>
                                                    <p className="text-2xl font-black text-slate-900">Rp {car.p}<span className="text-sm font-medium text-slate-400">/hr</span></p>
                                                </div>
                                                <button className="bg-sky-500 hover:bg-sky-600 text-white p-5 rounded-[1.5rem] transition-all shadow-lg shadow-sky-500/20 active:scale-90">
                                                    <Icon name="chevron-right" size={24} />
                                                </button>
                                            </div>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* --- CARA PESAN --- */}
                    <section id="cara-pesan" className="py-24 bg-white">
                        <div className="container mx-auto px-6">
                            <motion.div initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={fadeUp} className="text-center mb-20">
                                <span className="text-sky-500 font-bold uppercase tracking-[0.2em] text-xs">Prosedur</span>
                                <h2 className="text-4xl font-extrabold mt-3 text-slate-900">4 Langkah Mudah Menyewa</h2>
                            </motion.div>
                            <div className="relative">
                                {/* Garis Penghubung (Hanya Desktop) */}
                                <div className="hidden lg:block absolute top-1/2 left-0 w-full h-0.5 bg-slate-100 -translate-y-1/2 z-0"></div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 relative z-10">
                                    {[
                                        { s: "01", t: "Pilih Unit", d: "Telusuri katalog armada kami dan pilih yang sesuai kebutuhan Anda." },
                                        { s: "02", t: "Isi Formulir", d: "Lengkapi data diri dan jadwal perjalanan melalui widget booking atau WA." },
                                        { s: "03", t: "Pembayaran", d: "Lakukan konfirmasi pembayaran DP melalui transfer bank resmi kami." },
                                        { s: "04", t: "Siap Jalan", d: "Unit mobil akan dikirim atau siap diambil sesuai lokasi penjemputan." }
                                    ].map((step, idx) => (
                                        <motion.div key={idx} initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={zoomIn} className="bg-white p-10 rounded-[2.5rem] text-center shadow-lg border border-slate-50">
                                            <div className="w-14 h-14 bg-sky-500 text-white rounded-full flex items-center justify-center font-black mx-auto mb-8 shadow-xl shadow-sky-500/30 text-xl">{step.s}</div>
                                            <h4 className="text-2xl font-bold mb-4 text-slate-900">{step.t}</h4>
                                            <p className="text-slate-500 text-sm leading-relaxed">{step.d}</p>
                                        </motion.div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* --- SYARAT & KETENTUAN --- */}
                    <section id="syarat" className="py-24 bg-slate-50">
                        <div className="container mx-auto px-6 max-w-5xl">
                            <motion.div initial="hidden" whileInView="visible" viewport={{ once: false, amount: 0.3 }} variants={fadeUp} className="bg-white rounded-[4rem] p-10 md:p-20 shadow-xl border border-white">
                                <div className="text-center mb-16">
                                    <span className="text-sky-500 font-bold uppercase tracking-[0.2em] text-xs">Informasi Penting</span>
                                    <h2 className="text-4xl font-extrabold mt-3 text-slate-900">Syarat & Ketentuan</h2>
                                </div>
                                <div className="grid md:grid-cols-2 gap-16">
                                    <div className="space-y-6">
                                        <h5 className="font-bold text-sky-600 flex items-center gap-3 text-lg"><Icon name="check-circle-2" size={20} /> Penyewa Perorangan</h5>
                                        <ul className="space-y-4">
                                            {["Foto KTP Asli (E-KTP)", "Foto SIM A (Masih Aktif)", "Foto Selfie dengan KTP", "Akun Media Sosial Aktif (Instagram/FB)"].map((t, i) => (
                                                <li key={i} className="flex items-start gap-4 text-slate-600 text-sm">
                                                    <Icon name="check" size={16} className="text-sky-500 mt-1 shrink-0" /> {t}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                    <div className="space-y-6">
                                        <h5 className="font-bold text-sky-600 flex items-center gap-3 text-lg"><Icon name="check-circle-2" size={20} /> Penyewa Perusahaan</h5>
                                        <ul className="space-y-4">
                                            {["Fotokopi SIUP & TDP", "Fotokopi NPWP Perusahaan", "Surat Kuasa Direksi", "SIM A Driver yang ditunjuk"].map((t, i) => (
                                                <li key={i} className="flex items-start gap-4 text-slate-600 text-sm">
                                                    <Icon name="check" size={16} className="text-sky-500 mt-1 shrink-0" /> {t}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                <div className="mt-16 p-6 bg-slate-50 rounded-2xl border-l-4 border-sky-500">
                                    <p className="text-xs text-slate-500 italic leading-relaxed">
                                        * Catatan: Roy Rent berhak membatalkan pesanan secara sepihak apabila dokumen yang diberikan tidak valid atau tidak memenuhi kriteria verifikasi tim keamanan kami.
                                    </p>
                                </div>
                            </motion.div>
                        </div>
                    </section>

                    {/* --- FOOTER --- */}
                    <footer className="bg-slate-950 text-white pt-24 pb-12">
                        <div className="container mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-16 mb-20">
                            <div className="col-span-1 md:col-span-1">
                                <div className="flex items-center gap-2 mb-8">
                                    <div className="p-2 rounded-lg bg-sky-500 text-white"><Icon name="car" size={20} /></div>
                                    <span className="text-2xl font-black tracking-tighter">ROY<span className="text-sky-500">RENT</span></span>
                                </div>
                                <p className="text-slate-500 text-sm leading-relaxed mb-8">Penyedia jasa sewa mobil terbaik di Indonesia. Memberikan pengalaman berkendara yang tak terlupakan sejak 2015.</p>
                                <div className="flex gap-4">
                                    {[1, 2, 3].map(i => <div key={i} className="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-sky-500 hover:border-sky-500 transition-all cursor-pointer"><div className="w-3 h-3 bg-white/20 rounded-full"></div></div>)}
                                </div>
                            </div>
                            <div>
                                <h5 className="font-bold text-lg mb-8">Navigasi</h5>
                                <ul className="space-y-4 text-slate-500 text-sm">
                                    {navLinks.map(l => <li key={l.name}><a href={l.href} className="hover:text-sky-500 transition-colors">{l.name}</a></li>)}
                                </ul>
                            </div>
                            <div>
                                <h5 className="font-bold text-lg mb-8">Layanan</h5>
                                <ul className="space-y-4 text-slate-500 text-sm">
                                    <li className="hover:text-sky-500 cursor-pointer">Sewa Harian</li>
                                    <li className="hover:text-sky-500 cursor-pointer">Sewa Bulanan</li>
                                    <li className="hover:text-sky-500 cursor-pointer">Antar Jemput Bandara</li>
                                    <li className="hover:text-sky-500 cursor-pointer">Wedding Car</li>
                                </ul>
                            </div>
                            <div>
                                <h5 className="font-bold text-lg mb-8">Kontak</h5>
                                <div className="space-y-6">
                                    <div className="flex gap-4 text-sm text-slate-500">
                                        <Icon name="map-pin" className="text-sky-500 shrink-0" size={20} />
                                        <span>Jl. Sudirman No. 45, Jakarta Selatan</span>
                                    </div>
                                    <div className="flex gap-4 text-sm text-slate-500 font-bold">
                                        <Icon name="phone" className="text-sky-500 shrink-0" size={20} />
                                        <span>0812-3456-7890</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="container mx-auto px-6 pt-10 border-t border-white/5 text-center text-slate-600 text-[10px] uppercase tracking-[0.3em]">
                            © 2024 Roy Rent Indonesia. All Rights Reserved.
                        </div>
                    </footer>

                    {/* WA BUTTON */}
                    <a href="https://wa.me/6281234567890" target="_blank" className="fixed bottom-8 right-8 z-[100] bg-green-500 text-white p-5 rounded-full shadow-2xl flex items-center gap-0 hover:gap-3 transition-all duration-300 group overflow-hidden active:scale-90">
                        <span className="max-w-0 group-hover:max-w-xs transition-all duration-300 font-bold overflow-hidden whitespace-nowrap">Chat Admin</span>
                        <Icon name="phone" fill="white" size={24} />
                    </a>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
